kind = "web"
previewPath = "/"
title = "Sleep Habits Survey"
version = "1.0.0"
id = "artifacts/sleep-survey"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20696

[services.development]
run = "pnpm --filter @workspace/sleep-survey run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sleep-survey", "run", "build" ]
publicDir = "artifacts/sleep-survey/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20696"
BASE_PATH = "/"
